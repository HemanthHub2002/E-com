services:
  - type: web
    name: e-com-store
    env: python
    buildCommand: "./build.sh"
    startCommand: "python manage.py migrate && python seed_store.py && python seed_gallery.py && gunicorn ecommerce.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: DJANGO_SETTINGS_MODULE
        value: ecommerce.settings
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
